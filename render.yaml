services:
  # Backend API service
  - type: web
    name: hospital-management-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
        placeholder: "Your frontend app URL (e.g. https://my-frontend.onrender.com)"
      - key: MONGO_URI
        sync: false
        placeholder: "Your MongoDB Atlas connection string"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRE
        value: 15m
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Google Gemini API Key"
      - key: GEMINI_MODEL
        value: gemini-1.5-flash


  # Frontend static site
  - type: web
    name: hospital-management-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
        placeholder: "Your backend URL with suffix (e.g. https://hospital-management-backend.onrender.com/api/v1)"
      - key: VITE_SOCKET_URL
        sync: false
        placeholder: "Your backend URL (e.g. https://hospital-management-backend.onrender.com)"
